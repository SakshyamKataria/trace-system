version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: trace-postgres
    environment:                              

      POSTGRES_USER: trace_user
      POSTGRES_PASSWORD: trace_pass
      POSTGRES_DB: trace_db
    ports:
      - "5432:5432"
    volumes:
      - trace_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: trace-redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    container_name: trace-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - trace_minio_data:/data

  backend:
    build: ./backend
    container_name: trace-backend
    depends_on:
      - postgres
      - redis
      - minio
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  worker:
    build: ./backend
    container_name: trace-worker
    depends_on:
      - postgres
      - redis
      - minio
    command: python -u -m app.worker.worker

  jenkins:
    build: ./jenkins
    container_name: trace-jenkins
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - trace_jenkins_data:/var/jenkins_home

  frontend:
    build: ./frontend
    container_name: trace-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  trace_pgdata:
  trace_minio_data:
  trace_jenkins_data: